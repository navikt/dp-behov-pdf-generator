apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: dp-behov-pdf-generator
  namespace: teamdagpenger
  labels:
    team: teamdagpenger
spec:
  image: "{{ image }}"
  liveness:
    path: /isalive
  readiness:
    path: /isready
  port: 8080
  prometheus:
    enabled: true
    path: /metrics
  kafka:
    pool: "{{ kafka_pool }}"
  replicas:
    min: 3
    max: 6
  resources:
    limits:
      memory: 6144Mi
    requests:
      cpu: 190m
      memory: 512Mi
  env:
    # ZGC gir sub-millisekund GC-pauser uavhengig av heap-størrelse.
    # Godt egnet for denne appen som konstant allokerer og forkaster store JSON-objekter
    # fra rapids-topicet, i tillegg til kortvarige minnetopper ved PDF-generering.
    # 50% av 6144 = 3072Mi tilgjengelig for heap.
    - name: JDK_JAVA_OPTIONS
      value: >-
        -XX:+UseZGC
        -XX:ActiveProcessorCount=4
        -XX:MaxRAMPercentage=50.0
    - name: DP_MELLOMLAGRING_API_SCOPE
      value: "{{ dp_mellomlagring_api_scope }}"
  ingresses:
    - {{ ingress }}
  azure:
    application:
      enabled: true
  accessPolicy:
    inbound:
      rules:
        - application: dp-rapportering
        - application: dp-melding-om-vedtak
    outbound:
      rules:
        - application: dp-mellomlagring
        - application: logging
          namespace: nais-system
  gcp:
    permissions:
      - resource:
          apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
          kind: Project
        role: roles/cloudprofiler.agent
  observability:
    logging:
      destinations:
        - id: loki
        - id: elastic
    autoInstrumentation:
      enabled: true
      runtime: java
